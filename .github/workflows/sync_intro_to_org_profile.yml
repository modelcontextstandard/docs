name: Sync Intro.md to org profile README

on:
  push:
    branches: [main]
    paths:
      - "docs/docs/Intro.md"

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4

      - name: Render README (strip Docusaurus frontmatter)
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations
          import re
          from pathlib import Path

          src = Path("docs/docs/Intro.md").read_text(encoding="utf-8")
          # Strip YAML frontmatter at the top (--- ... ---)
          m = re.match(r"^---\\r?\\n.*?\\r?\\n---\\r?\\n", src, flags=re.S)
          if m:
            src = src[m.end():]
          # Normalize line endings for GitHub rendering
          src = src.replace("\\r\\n", "\\n")
          Path("intro_for_profile_README.md").write_text(src, encoding="utf-8")
          PY

      - name: Checkout org profile repo
        uses: actions/checkout@v4
        with:
          repository: modelcontextstandard/.github
          token: ${{ secrets.ORG_SYNC_TOKEN }}
          path: org-profile

      - name: Copy rendered README into org profile
        shell: bash
        run: |
          cp intro_for_profile_README.md org-profile/profile/README.md

      - name: Create PR in org profile repo
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.ORG_SYNC_TOKEN }}
          path: org-profile
          commit-message: "sync: Intro.md from docs"
          title: "sync: Intro.md from docs"
          body: |
            Automated sync from `modelcontextstandard/docs`:
            - Source: `docs/docs/Intro.md`
            - Target: `.github/profile/README.md`
            
            This PR is created by a workflow in the docs repository.
          branch: sync/intro-md
          delete-branch: true
